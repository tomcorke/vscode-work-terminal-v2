<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}'; font-src {{cspSource}} data:; connect-src 'self' blob:; img-src {{cspSource}} blob: data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{styleUri}}">
  <title>Work Terminal</title>
</head>
<body>
  <div class="wt-main-view">
    <!-- Terminal panel (full width - task list is now in the sidebar) -->
    <div class="wt-terminal-panel" id="right-panel">
      <div class="wt-task-title" id="task-title">
        <div class="wt-task-title-row">
          <span class="wt-task-title-text" id="task-title-text"></span>
        </div>
      </div>
      <div class="wt-tab-bar" id="tab-bar">
        <div class="wt-tabs-container" id="tabs-container"></div>
        <div class="wt-tab-buttons" id="tab-buttons"></div>
      </div>
      <div class="wt-terminal-wrapper" id="terminal-wrapper">
        <div class="wt-empty-state" id="empty-state">
          Select an item from the sidebar to begin
        </div>
      </div>
    </div>
  </div>

  <script nonce="{{nonce}}" src="{{webviewUri}}"></script>
</body>
</html>
