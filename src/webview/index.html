<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}'; font-src {{cspSource}} data:; connect-src 'self' blob:; img-src {{cspSource}} blob: data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{styleUri}}">
  <title>Work Terminal</title>
</head>
<body>
  <div class="wt-main-view">
    <!-- Left panel: toolbar + list -->
    <div class="wt-left-panel" id="left-panel">
      <div class="wt-toolbar">
        <button class="wt-toolbar-icon-btn" id="filter-toggle-btn" title="Toggle filter" aria-label="Toggle filter">
          <span class="codicon codicon-filter"></span>
        </button>
        <button class="wt-toolbar-btn" id="new-item-btn">+ New Item</button>
      </div>
      <div class="wt-filter-container" id="filter-container" style="display: none;">
        <input
          type="text"
          class="wt-filter-input"
          id="filter-input"
          placeholder="Filter items..."
        />
      </div>
      <div class="wt-list-panel" id="list-panel">
        <!-- Card sections rendered by JS -->
      </div>
    </div>

    <!-- Resizable divider -->
    <div class="wt-divider" id="divider"></div>

    <!-- Right panel: terminal tabs -->
    <div class="wt-right-panel" id="right-panel">
      <div class="wt-task-title" id="task-title">
        <div class="wt-task-title-row">
          <span class="wt-task-title-text" id="task-title-text"></span>
        </div>
      </div>
      <div class="wt-tab-bar" id="tab-bar">
        <div class="wt-tabs-container" id="tabs-container"></div>
        <div class="wt-tab-buttons" id="tab-buttons"></div>
      </div>
      <div class="wt-terminal-wrapper" id="terminal-wrapper">
        <div class="wt-empty-state" id="empty-state">
          Select an item to begin
        </div>
      </div>
    </div>
  </div>

  <script nonce="{{nonce}}" src="{{webviewUri}}"></script>
</body>
</html>
